apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: binding-add
spec:
  namespace: e2e-binding-add
  steps:
    - name: create BillingAccount and wait for Ready
      try:
        - apply:
            file: billing-account.yaml
        - assert:
            timeout: 60s
            resource:
              apiVersion: billing.miloapis.com/v1alpha1
              kind: BillingAccount
              metadata:
                name: e2e-add
              status:
                phase: Ready
    - name: wait for provider finalizer and Synced event
      try:
        - assert:
            timeout: 120s
            resource:
              apiVersion: v1
              kind: Event
              involvedObject:
                apiVersion: billing.miloapis.com/v1alpha1
                kind: BillingAccount
                name: e2e-add
              reason: Synced
              type: Normal
    - name: create BillingAccountBinding and wait for Active
      try:
        - apply:
            file: binding.yaml
        - assert:
            timeout: 60s
            resource:
              apiVersion: billing.miloapis.com/v1alpha1
              kind: BillingAccountBinding
              metadata:
                name: e2e-add-alpha
              status:
                phase: Active
    - name: wait for a post-binding Synced event
      try:
        # Delivery of the project trait is confirmed by a second Synced
        # event emitted after the binding transitions to Active.
        - assert:
            timeout: 120s
            resource:
              apiVersion: v1
              kind: Event
              involvedObject:
                apiVersion: billing.miloapis.com/v1alpha1
                kind: BillingAccount
                name: e2e-add
              reason: Synced
              type: Normal
    - name: delete the BillingAccount to soft-disable the sandbox customer
      try:
        - delete:
            ref:
              apiVersion: billing.miloapis.com/v1alpha1
              kind: BillingAccount
              name: e2e-add
