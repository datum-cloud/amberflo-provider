apiVersion: config.amberflo.providers.datum.net/v1alpha1
kind: AmberfloProvider
metricsServer:
  bindAddress: "0"
# Single-cluster test-infra deployment: billing CRDs and the provider
# controller share one kube-apiserver, so kubeconfigPath is empty
# and controller-runtime uses the pod's in-cluster service account.
kubeconfigPath: ""
amberfloBaseURL: https://app.amberflo.io
amberfloAPIKeyPath: /var/run/secrets/amberflo/api-key
amberfloRateLimitPerSec: 50
allowCustomerDelete: false
